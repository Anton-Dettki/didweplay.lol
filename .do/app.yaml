name: did-we-play-before
region: fra

services:
  - name: api
    dockerfile_path: backend/Dockerfile
    source_dir: backend
    github:
      repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
      branch: main
      deploy_on_push: true
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /healthz
      initial_delay_seconds: 15
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: RIOT_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_WITH_RIOT_API_KEY
      - key: CORS_ORIGINS
        scope: RUN_TIME
        value: https://replace-me-with-frontend-url.ondigitalocean.app
      - key: CACHE_DIR
        scope: RUN_TIME
        value: /tmp/did-we-play-before-cache

static_sites:
  - name: web
    source_dir: frontend
    github:
      repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME
      branch: main
      deploy_on_push: true
    build_command: npm ci && npm run build
    output_dir: dist
    envs:
      - key: VITE_API_BASE_URL
        scope: BUILD_TIME
        value: https://replace-me-with-api-url.ondigitalocean.app
